<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Responsive Pizza Page</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .sidebar {
            width: 250px;
            display: none;
            position: fixed;
            height: 100%;
            background: #333;
            color: white;
            padding: 20px;
            overflow-y: auto;
        }
        .sidebar.active {
            display: block;
        }
        .content {
            margin-left: 250px;
            padding: 20px;
        }
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }
            .content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <h2>Menu</h2>
        <p>Pizza Options</p>
        <button onclick="toggleFullscreen()">Toggle Fullscreen</button>
    </div>
    <div class="content">
        <button onclick="toggleSidebar()" id="sidebarToggle">Toggle Sidebar</button>
        <h1>Welcome to Ultra Pizza Hub</h1>
        <div class="iframe-container">
            <iframe src="your_iframe_source.html" width="100%" height="600px" frameborder="0"></iframe>
        </div>
    </div>
    <script>
        function toggleFullscreen() {
            const elem = document.documentElement;
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                elem.requestFullscreen();
            }
        }
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('active');
        }
    </script>
</body>
</html>
