<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Fullscreen Responsive Site</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            transition: background-color 0.3s ease;
        }
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
        }
        body.dark-mode {
            --bg-color: #000000;
            --text-color: #ffffff;
        }
        header {
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0078d7;
            color: white;
        }
        header button {
            background: transparent;
            border: none;
            color: white;
            cursor: pointer;
        }
        main {
            padding: 20px;
        }
        .site {
            padding: 10px;
            border: 1px solid #ccc;
            margin: 10px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .favorites {
            display: none;
        }
        .search {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Ultimate Site Hub</h1>
        <div>
            <button id="darkModeToggle">Toggle Dark Mode</button>
            <input type="text" id="searchInput" class="search" placeholder="Search sites...">
        </div>
    </header>
    <main id="siteList">
        <!-- Dynamically populated list of sites will go here -->
    </main>
    <script>
        const sites = [
            { name: 'Site 1', url: 'https://example1.com' },
            { name: 'Site 2', url: 'https://example2.com' },
            // ... more than 100 sites ...
            { name: 'Site 100', url: 'https://example100.com' }
        ];

        const siteList = document.getElementById('siteList');
        const searchInput = document.getElementById('searchInput');
        const darkModeToggle = document.getElementById('darkModeToggle');

        function populateSites() {
            siteList.innerHTML = '';
            sites.forEach(site => {
                const siteDiv = document.createElement('div');
                siteDiv.className = 'site';
                siteDiv.innerHTML = `<a href='${site.url}' target='_blank' style='color: inherit;'>${site.name}</a>`;
                siteList.appendChild(siteDiv);
            });
        }

        searchInput.addEventListener('input', () => {
            const searchTerm = searchInput.value.toLowerCase();
            const filteredSites = sites.filter(site => site.name.toLowerCase().includes(searchTerm));
            siteList.innerHTML = '';
            filteredSites.forEach(site => {
                const siteDiv = document.createElement('div');
                siteDiv.className = 'site';
                siteDiv.innerHTML = `<a href='${site.url}' target='_blank' style='color: inherit;'>${site.name}</a>`;
                siteList.appendChild(siteDiv);
            });
        });

        darkModeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
        });

        populateSites();
    </script>
</body>
</html>
